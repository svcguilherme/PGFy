services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: careerhub-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "CareerHub@2024"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "CareerHub@2024" -Q "SELECT 1" -No -C
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careerhub-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver,1433;Database=careerhub;
        User Id=sa;Password=CareerHub@2024;
        TrustServerCertificate=True
      JwtSettings__SecretKey: "${JWT_SECRET_KEY:-CareerHub_JWT_Secret_Key_Change_In_Production_32chars}"
      JwtSettings__Issuer: CareerHub
      JwtSettings__Audience: CareerHubUsers
      JwtSettings__AccessTokenExpirationMinutes: "15"
      JwtSettings__RefreshTokenExpirationDays: "7"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careerhub-web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlserver_data:
